name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - name: Run base-R test suite
        run: Rscript tests/test_basics.R
      - name: Run full analysis
        run: Rscript scripts/run_all.R
