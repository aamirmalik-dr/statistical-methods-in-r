name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - name: Regenerate sample data
        run: Rscript scripts/make_sample_data.R
      - name: Run base-R test suite
        run: Rscript tests/test_basics.R
      - name: Run full experiment suite
        run: Rscript scripts/run_all.R
      - name: Check outputs exist
        run: |
          test -f results/RESULTS.md
          test -f results/diagnostics_panel.png
